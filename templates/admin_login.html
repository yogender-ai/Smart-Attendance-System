{% extends 'base.html' %}
{% block title %}Admin Login - Smart Attendance AI{% endblock %}

{% block auth_content %}
<div style="text-align:center; margin-bottom:2rem;">
    <div style="display:inline-flex; align-items:center; justify-content:center; width:56px; height:56px; border-radius:14px; background:rgba(139,92,246,0.08); border:1px solid rgba(139,92,246,0.12); margin-bottom:1.25rem;">
        <i class="fa-solid fa-shield-halved" style="font-size:1.5rem; color:var(--accent-purple);"></i>
    </div>
    <h1 style="font-size:1.6rem; font-weight:800; color:var(--text-primary); margin-bottom:0.3rem;">Admin Gateway</h1>
    <p style="color:var(--text-muted); font-size:0.82rem;">Restricted access for authorized administrators.</p>
</div>

<form method="POST" id="adminLoginForm" style="display:flex; flex-direction:column; gap:1rem;">
    <div>
        <label style="display:block; font-size:0.78rem; font-weight:600; color:var(--text-secondary); margin-bottom:0.4rem;">Admin Email</label>
        <div style="position:relative;">
            <i class="fa-regular fa-envelope" style="position:absolute; left:0.9rem; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:0.85rem;"></i>
            <input type="email" name="email" class="form-control" style="padding-left:2.5rem;" required placeholder="admin@domain.com" autocomplete="email">
        </div>
    </div>
    <div>
        <label style="display:block; font-size:0.78rem; font-weight:600; color:var(--text-secondary); margin-bottom:0.4rem;">Clearance Code</label>
        <div style="position:relative;">
            <i class="fa-solid fa-key" style="position:absolute; left:0.9rem; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:0.85rem;"></i>
            <input type="password" name="password" class="form-control" style="padding-left:2.5rem;" required placeholder="••••••••" autocomplete="current-password">
        </div>
    </div>
    <button type="submit" id="adminLoginBtn" style="margin-top:0.5rem; padding:0.85rem; background:linear-gradient(135deg, var(--accent-purple), #7c3aed); color:#fff; border:none; border-radius:10px; font-weight:700; font-size:0.9rem; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:0.5rem; font-family:inherit; transition:all 0.3s; box-shadow:0 4px 15px rgba(139,92,246,0.25);">
        <i class="fa-solid fa-unlock-keyhole" id="adminIcon"></i> <span id="adminBtnText">Unlock System</span>
    </button>
</form>

<div style="text-align:center; margin-top:1.5rem; padding-top:1.25rem; border-top:1px solid var(--border);">
    <a href="{{ url_for('login') }}" style="font-size:0.72rem; color:var(--text-muted); text-decoration:none; font-weight:600; letter-spacing:0.5px; text-transform:uppercase;">
        <i class="fa-regular fa-user"></i> Employee Portal
    </a>
</div>

<script>
document.getElementById('adminLoginForm').addEventListener('submit', function() {
    const btn = document.getElementById('adminLoginBtn');
    const text = document.getElementById('adminBtnText');
    const icon = document.getElementById('adminIcon');
    btn.disabled = true;
    text.innerText = 'Authenticating...';
    icon.className = 'fa-solid fa-circle-notch fa-spin';
    btn.style.opacity = '0.8';
});
</script>
{% endblock %}
