{% extends 'base.html' %}
{% block title %}Admin Login - SmartFace{% endblock %}

{% block auth_content %}
<div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-[#818cf8]/10 border border-[#818cf8]/20 mb-6 shadow-[0_0_30px_rgba(129,140,248,0.15)]">
        <i class="fa-solid fa-shield-halved text-3xl text-[#818cf8]"></i>
    </div>
    <h1 class="text-3xl font-bold text-white mb-2 tracking-tight">Admin Gateway</h1>
    <p class="text-slate-400 font-medium">Root access restricted to authorized personnel.</p>
</div>

<form method="POST" class="space-y-5">
    <div>
        <label class="block text-sm font-semibold text-slate-300 mb-2">Admin Identity</label>
        <div class="relative group">
            <i class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-[#818cf8] transition-colors"></i>
            <input type="email" name="email" class="w-full pl-12 pr-4 py-3.5 bg-black/40 border border-white/10 rounded-xl text-white placeholder-slate-600 focus:outline-none focus:border-[#818cf8]/50 focus:ring-1 focus:ring-[#818cf8]/50 transition-all font-medium" required placeholder="admin@domain.com">
        </div>
    </div>
    
    <div>
        <label class="block text-sm font-semibold text-slate-300 mb-2">Clearance Code</label>
        <div class="relative group">
            <i class="fa-solid fa-key absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-[#818cf8] transition-colors"></i>
            <input type="password" name="password" class="w-full pl-12 pr-4 py-3.5 bg-black/40 border border-white/10 rounded-xl text-white placeholder-slate-600 focus:outline-none focus:border-[#818cf8]/50 focus:ring-1 focus:ring-[#818cf8]/50 transition-all font-medium" required placeholder="••••••••">
        </div>
    </div>
    
    <button type="submit" class="w-full bg-[#818cf8] text-black font-bold text-lg py-4 rounded-xl mt-4 hover:scale-[1.02] transition-all hover:bg-[#a5b4fc] shadow-[0_4px_20px_rgba(129,140,248,0.2)] hover:shadow-[0_10px_30px_rgba(129,140,248,0.4)] flex justify-center items-center gap-2">
        <i class="fa-solid fa-unlock-keyhole"></i> Unlock System
    </button>
</form>

<div class="text-center mt-8 pt-6 border-t border-white/10">
    <div>
        <a href="{{ url_for('login') }}" class="text-xs text-slate-500 hover:text-slate-300 font-medium tracking-wide uppercase"><i class="fa-regular fa-user"></i> Return to Employee Portal</a>
    </div>
</div>
{% endblock %}
