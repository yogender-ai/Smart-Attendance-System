{% extends 'base.html' %}
{% block title %}Register - Smart Attendance AI{% endblock %}

{% block auth_content %}
<div style="text-align:center; margin-bottom:1.5rem;">
    <div style="display:inline-flex; align-items:center; justify-content:center; width:56px; height:56px; border-radius:14px; background:rgba(6,182,212,0.08); border:1px solid rgba(6,182,212,0.12); margin-bottom:1.25rem;">
        <i class="fa-solid fa-address-card" style="font-size:1.5rem; color:var(--accent-cyan);"></i>
    </div>
    <h1 style="font-size:1.6rem; font-weight:800; color:var(--text-primary); margin-bottom:0.3rem;">Create Profile</h1>
    <p style="color:var(--text-muted); font-size:0.82rem;">Join the Smart Attendance system.</p>
</div>

<form method="POST" id="registerForm" style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem;" novalidate>
    <div>
        <label style="display:block; font-size:0.72rem; font-weight:600; color:var(--text-secondary); margin-bottom:0.3rem;">Employee ID</label>
        <div style="position:relative;">
            <i class="fa-solid fa-id-badge" style="position:absolute; left:0.8rem; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:0.8rem;"></i>
            <input type="text" name="employee_id" id="empId" class="form-control" style="padding-left:2.2rem; padding:0.65rem 0.8rem 0.65rem 2.2rem; text-transform:uppercase;" required placeholder="EMP001" maxlength="15" autocomplete="off">
        </div>
        <div class="field-error" id="empIdErr"></div>
    </div>
    <div>
        <label style="display:block; font-size:0.72rem; font-weight:600; color:var(--text-secondary); margin-bottom:0.3rem;">Full Name</label>
        <div style="position:relative;">
            <i class="fa-regular fa-user" style="position:absolute; left:0.8rem; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:0.8rem;"></i>
            <input type="text" name="name" id="nameField" class="form-control" style="padding-left:2.2rem; padding:0.65rem 0.8rem 0.65rem 2.2rem;" required placeholder="John Doe" maxlength="50">
        </div>
        <div class="field-error" id="nameErr"></div>
    </div>
    <div style="grid-column:1/3;">
        <label style="display:block; font-size:0.72rem; font-weight:600; color:var(--text-secondary); margin-bottom:0.3rem;">Email</label>
        <div style="position:relative;">
            <i class="fa-regular fa-envelope" style="position:absolute; left:0.8rem; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:0.8rem;"></i>
            <input type="email" name="email" id="emailField" class="form-control" style="padding-left:2.2rem; padding:0.65rem 0.8rem 0.65rem 2.2rem;" required placeholder="john@domain.com" maxlength="100">
        </div>
        <div class="field-error" id="emailErr"></div>
    </div>
    <div>
        <label style="display:block; font-size:0.72rem; font-weight:600; color:var(--text-secondary); margin-bottom:0.3rem;">Phone</label>
        <div style="position:relative;">
            <i class="fa-solid fa-phone" style="position:absolute; left:0.8rem; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:0.8rem;"></i>
            <input type="text" name="phone" id="phoneField" class="form-control" style="padding-left:2.2rem; padding:0.65rem 0.8rem 0.65rem 2.2rem;" required placeholder="9876543210" maxlength="15">
        </div>
        <div class="field-error" id="phoneErr"></div>
    </div>
    <div>
        <label style="display:block; font-size:0.72rem; font-weight:600; color:var(--text-secondary); margin-bottom:0.3rem;">Department</label>
        <div style="position:relative;">
            <i class="fa-solid fa-briefcase" style="position:absolute; left:0.8rem; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:0.8rem; z-index:1;"></i>
            <select name="department" class="form-control" style="padding-left:2.2rem; padding:0.65rem 0.8rem 0.65rem 2.2rem; appearance:none;">
                {% for dept in departments %}
                <option value="{{ dept }}" style="background:#0d1117;">{{ dept }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
    <div style="grid-column:1/3;">
        <label style="display:block; font-size:0.72rem; font-weight:600; color:var(--text-secondary); margin-bottom:0.3rem;">Password</label>
        <div style="position:relative;">
            <i class="fa-solid fa-lock" style="position:absolute; left:0.8rem; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:0.8rem;"></i>
            <input type="password" name="password" id="pwField" class="form-control" style="padding-left:2.2rem; padding:0.65rem 0.8rem 0.65rem 2.2rem;" required placeholder="Min 8 chars, 1 upper, 1 digit, 1 special" minlength="8" maxlength="128">
            <button type="button" onclick="togglePw('pwField', this)" style="position:absolute; right:0.8rem; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:0.85rem;"><i class="fa-regular fa-eye"></i></button>
        </div>
        <!-- Password Strength Meter -->
        <div style="margin-top:0.4rem;">
            <div style="display:flex; gap:4px; margin-bottom:4px;">
                <div id="str1" style="flex:1; height:3px; border-radius:2px; background:rgba(255,255,255,0.06); transition:all 0.3s;"></div>
                <div id="str2" style="flex:1; height:3px; border-radius:2px; background:rgba(255,255,255,0.06); transition:all 0.3s;"></div>
                <div id="str3" style="flex:1; height:3px; border-radius:2px; background:rgba(255,255,255,0.06); transition:all 0.3s;"></div>
                <div id="str4" style="flex:1; height:3px; border-radius:2px; background:rgba(255,255,255,0.06); transition:all 0.3s;"></div>
            </div>
            <div id="pwStrength" style="font-size:0.65rem; font-weight:600; color:var(--text-muted);"></div>
        </div>
        <!-- Password Requirements -->
        <div style="margin-top:0.4rem; display:grid; grid-template-columns:1fr 1fr; gap:2px;">
            <div class="pw-req" id="pwLen"><i class="fa-solid fa-circle" style="font-size:5px;"></i> 8+ characters</div>
            <div class="pw-req" id="pwUp"><i class="fa-solid fa-circle" style="font-size:5px;"></i> 1 uppercase</div>
            <div class="pw-req" id="pwLow"><i class="fa-solid fa-circle" style="font-size:5px;"></i> 1 lowercase</div>
            <div class="pw-req" id="pwDig"><i class="fa-solid fa-circle" style="font-size:5px;"></i> 1 digit</div>
            <div class="pw-req" id="pwSpc"><i class="fa-solid fa-circle" style="font-size:5px;"></i> 1 special char</div>
        </div>
    </div>
    <div style="grid-column:1/3;">
        <label style="display:block; font-size:0.72rem; font-weight:600; color:var(--text-secondary); margin-bottom:0.3rem;">Confirm Password</label>
        <div style="position:relative;">
            <i class="fa-solid fa-lock" style="position:absolute; left:0.8rem; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:0.8rem;"></i>
            <input type="password" id="pwConfirm" class="form-control" style="padding-left:2.2rem; padding:0.65rem 0.8rem 0.65rem 2.2rem;" required placeholder="Re-enter password">
        </div>
        <div class="field-error" id="pwMatchErr"></div>
    </div>
    <div style="grid-column:1/3;">
        <button type="submit" class="btn-primary" id="regBtn" style="margin-top:0.25rem; padding:0.75rem;">
            <span id="regBtnText">Initialize Profile</span>
        </button>
    </div>
</form>

<div style="text-align:center; margin-top:1rem;">
    <a href="{{ url_for('login') }}" style="font-size:0.78rem; color:var(--text-muted); text-decoration:none;">Already registered? <span style="color:var(--accent-emerald); font-weight:600;">Login Here</span></a>
</div>

<style>
.field-error { font-size:0.65rem; color:var(--accent-rose); font-weight:600; margin-top:2px; min-height:14px; }
.pw-req { font-size:0.62rem; color:var(--text-muted); display:flex; align-items:center; gap:4px; transition:color 0.2s; }
.pw-req.pass { color:var(--accent-emerald); }
.pw-req.pass i { color:var(--accent-emerald); }
.form-control.valid { border-color:rgba(16,185,129,0.3) !important; }
.form-control.invalid { border-color:rgba(244,63,94,0.3) !important; }
</style>

<script>
function togglePw(id, btn) {
    const el = document.getElementById(id);
    if (el.type === 'password') { el.type = 'text'; btn.innerHTML = '<i class="fa-regular fa-eye-slash"></i>'; }
    else { el.type = 'password'; btn.innerHTML = '<i class="fa-regular fa-eye"></i>'; }
}

// Name validation — strip double spaces, letters only
document.getElementById('nameField').addEventListener('input', function() {
    this.value = this.value.replace(/\s{2,}/g, ' ');
    const v = this.value.trim();
    const err = document.getElementById('nameErr');
    if (v.length > 0 && v.length < 2) { err.textContent = 'Min 2 characters'; this.classList.add('invalid'); this.classList.remove('valid'); }
    else if (v && !/^[A-Za-z\s\-']+$/.test(v)) { err.textContent = 'Letters, spaces, hyphens only'; this.classList.add('invalid'); this.classList.remove('valid'); }
    else if (v.length >= 2) { err.textContent = ''; this.classList.add('valid'); this.classList.remove('invalid'); }
    else { err.textContent = ''; this.classList.remove('valid', 'invalid'); }
});

// Employee ID — alphanumeric + hyphens, auto uppercase
document.getElementById('empId').addEventListener('input', function() {
    this.value = this.value.replace(/[^A-Za-z0-9\-]/g, '').toUpperCase();
    const err = document.getElementById('empIdErr');
    if (this.value.length > 0 && this.value.length < 3) { err.textContent = 'Min 3 characters'; this.classList.add('invalid'); this.classList.remove('valid'); }
    else if (this.value.length >= 3) { err.textContent = ''; this.classList.add('valid'); this.classList.remove('invalid'); }
    else { err.textContent = ''; this.classList.remove('valid', 'invalid'); }
});

// Email validation
document.getElementById('emailField').addEventListener('input', function() {
    const err = document.getElementById('emailErr');
    const pattern = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
    if (this.value && !pattern.test(this.value)) { err.textContent = 'Invalid email format'; this.classList.add('invalid'); this.classList.remove('valid'); }
    else if (this.value && pattern.test(this.value)) { err.textContent = ''; this.classList.add('valid'); this.classList.remove('invalid'); }
    else { err.textContent = ''; this.classList.remove('valid', 'invalid'); }
});

// Phone — digits only
document.getElementById('phoneField').addEventListener('input', function() {
    this.value = this.value.replace(/[^\d]/g, '');
    const err = document.getElementById('phoneErr');
    if (this.value.length > 0 && this.value.length < 10) { err.textContent = 'Min 10 digits'; this.classList.add('invalid'); this.classList.remove('valid'); }
    else if (this.value.length >= 10) { err.textContent = ''; this.classList.add('valid'); this.classList.remove('invalid'); }
    else { err.textContent = ''; this.classList.remove('valid', 'invalid'); }
});

// Password strength meter
document.getElementById('pwField').addEventListener('input', function() {
    const pw = this.value;
    let score = 0;
    const hasLen = pw.length >= 8;
    const hasUp = /[A-Z]/.test(pw);
    const hasLow = /[a-z]/.test(pw);
    const hasDig = /[0-9]/.test(pw);
    const hasSpc = /[!@#$%^&*()_+\-=\[\]{};:'",.<>?\/\\|`~]/.test(pw);

    if (hasLen) score++;
    if (hasUp) score++;
    if (hasLow) score++;
    if (hasDig) score++;
    if (hasSpc) score++;

    // Update requirement indicators
    document.getElementById('pwLen').className = 'pw-req ' + (hasLen ? 'pass' : '');
    document.getElementById('pwUp').className = 'pw-req ' + (hasUp ? 'pass' : '');
    document.getElementById('pwLow').className = 'pw-req ' + (hasLow ? 'pass' : '');
    document.getElementById('pwDig').className = 'pw-req ' + (hasDig ? 'pass' : '');
    document.getElementById('pwSpc').className = 'pw-req ' + (hasSpc ? 'pass' : '');

    // Strength bars
    const colors = ['', '#f43f5e', '#f59e0b', '#06b6d4', '#10b981'];
    const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
    for (let i = 1; i <= 4; i++) {
        document.getElementById('str' + i).style.background = i <= score - 1 ? colors[score - 1] : 'rgba(255,255,255,0.06)';
    }
    document.getElementById('pwStrength').textContent = pw.length > 0 ? labels[Math.min(score, 4)] : '';
    document.getElementById('pwStrength').style.color = colors[Math.min(score, 4)] || 'var(--text-muted)';
});

// Confirm password match
document.getElementById('pwConfirm').addEventListener('input', function() {
    const err = document.getElementById('pwMatchErr');
    const pw = document.getElementById('pwField').value;
    if (this.value && this.value !== pw) { err.textContent = 'Passwords do not match'; this.classList.add('invalid'); this.classList.remove('valid'); }
    else if (this.value && this.value === pw) { err.textContent = ''; this.classList.add('valid'); this.classList.remove('invalid'); }
    else { err.textContent = ''; this.classList.remove('valid', 'invalid'); }
});

// Form submit validation
document.getElementById('registerForm').addEventListener('submit', function(e) {
    const pw = document.getElementById('pwField').value;
    const confirm = document.getElementById('pwConfirm').value;
    const name = document.getElementById('nameField').value.trim();
    const phone = document.getElementById('phoneField').value;

    if (pw !== confirm) { e.preventDefault(); document.getElementById('pwMatchErr').textContent = 'Passwords do not match'; return; }
    if (name.length < 2) { e.preventDefault(); document.getElementById('nameErr').textContent = 'Name is required (min 2 chars)'; return; }
    if (phone.length < 10) { e.preventDefault(); document.getElementById('phoneErr').textContent = 'Phone must be 10+ digits'; return; }
    if (!/[A-Z]/.test(pw) || !/[a-z]/.test(pw) || !/[0-9]/.test(pw) || pw.length < 8) { e.preventDefault(); alert('Password does not meet requirements'); return; }

    const btn = document.getElementById('regBtn');
    const text = document.getElementById('regBtnText');
    btn.disabled = true;
    text.innerText = 'Creating Profile...';
    btn.style.opacity = '0.8';
});
</script>
{% endblock %}
