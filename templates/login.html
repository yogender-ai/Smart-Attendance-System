{% extends 'base.html' %}
{% block title %}Employee Login - Smart Attendance AI{% endblock %}

{% block auth_content %}
<div style="text-align:center; margin-bottom:2rem;">
    <div style="display:inline-flex; align-items:center; justify-content:center; width:56px; height:56px; border-radius:14px; background:rgba(16,185,129,0.08); border:1px solid rgba(16,185,129,0.12); margin-bottom:1.25rem;">
        <i class="fa-regular fa-user" style="font-size:1.5rem; color:var(--accent-emerald);"></i>
    </div>
    <h1 style="font-size:1.6rem; font-weight:800; color:var(--text-primary); margin-bottom:0.3rem;">Employee Portal</h1>
    <p style="color:var(--text-muted); font-size:0.82rem;">Verify your credentials to access the system.</p>
</div>

<form method="POST" id="loginForm" style="display:flex; flex-direction:column; gap:1rem;">
    <div>
        <label style="display:block; font-size:0.78rem; font-weight:600; color:var(--text-secondary); margin-bottom:0.4rem;">Work Email</label>
        <div style="position:relative;">
            <i class="fa-regular fa-envelope" style="position:absolute; left:0.9rem; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:0.85rem;"></i>
            <input type="email" name="email" class="form-control" style="padding-left:2.5rem;" required placeholder="name@domain.com" autocomplete="email">
        </div>
    </div>
    <div>
        <label style="display:block; font-size:0.78rem; font-weight:600; color:var(--text-secondary); margin-bottom:0.4rem;">Password</label>
        <div style="position:relative;">
            <i class="fa-solid fa-lock" style="position:absolute; left:0.9rem; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:0.85rem;"></i>
            <input type="password" name="password" class="form-control" style="padding-left:2.5rem;" required placeholder="••••••••" autocomplete="current-password">
        </div>
    </div>
    <button type="submit" class="btn-primary" id="loginBtn" style="margin-top:0.5rem; padding:0.85rem;">
        <span id="loginBtnText">Authenticate</span> <i class="fa-solid fa-arrow-right" id="loginBtnIcon"></i>
    </button>
</form>

<div style="text-align:center; margin-top:1.5rem; padding-top:1.25rem; border-top:1px solid var(--border);">
    <p style="font-size:0.78rem; color:var(--text-muted);">New here? <a href="{{ url_for('register') }}" style="color:var(--accent-emerald); font-weight:600; text-decoration:none;">Create Account</a></p>
    <a href="{{ url_for('admin_login') }}" style="display:inline-block; margin-top:0.5rem; font-size:0.68rem; color:var(--text-muted); text-decoration:none; font-weight:600; letter-spacing:0.5px; text-transform:uppercase;">
        <i class="fa-solid fa-shield-halved"></i> Admin Gateway
    </a>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function() {
    const btn = document.getElementById('loginBtn');
    const text = document.getElementById('loginBtnText');
    const icon = document.getElementById('loginBtnIcon');
    btn.disabled = true;
    text.innerText = 'Authenticating...';
    icon.className = 'fa-solid fa-circle-notch fa-spin';
    btn.style.opacity = '0.8';
});
</script>
{% endblock %}
