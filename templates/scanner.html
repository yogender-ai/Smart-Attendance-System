<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Scanner | Face ID</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    
    <style>
        :root {
            --primary-glow: rgba(56, 189, 248, 0.5);
            --success-glow: rgba(52, 211, 153, 0.6);
            --danger-glow: rgba(248, 113, 113, 0.6);
            --glass-bg: rgba(10, 14, 26, 0.5);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%; height: 100%;
            background-color: #000;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            color: #fff;
        }

        #video-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }
        
        #scanVideo {
            width: 100%; height: 100%;
            object-fit: contain;
            transform: scaleX(-1);
            filter: contrast(1.08) brightness(0.92) saturate(1.15);
        }

        .vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 35%, rgba(0,0,0,0.85) 100%);
            z-index: 2; pointer-events: none;
        }

        .top-nav {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: 25px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            display: flex; align-items: center; gap: 10px;
            font-size: 1.35rem; font-weight: 700; letter-spacing: 0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .logo i { font-size: 1.5rem; color: #10b981; }

        .nav-btns { display: flex; gap: 0.75rem; }

        .auth-btn {
            background: var(--glass-bg);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 10px 22px;
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.88rem;
            display: flex; align-items: center; gap: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .auth-btn:hover {
            background: rgba(255,255,255,0.08);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.25);
            border-color: rgba(16, 185, 129, 0.3);
        }

        /* Target Reticle */
        .target-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 400px; height: 500px;
            z-index: 5;
            display: flex; justify-content: center; align-items: center;
        }

        .bracket {
            position: absolute;
            width: 45px; height: 45px;
            border-color: #10b981;
            border-style: solid;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
            border-radius: 10px;
        }
        .tl { top:0; left:0; border-width: 3px 0 0 3px; }
        .tr { top:0; right:0; border-width: 3px 3px 0 0; }
        .bl { bottom:0; left:0; border-width: 0 0 3px 3px; }
        .br { bottom:0; right:0; border-width: 0 3px 3px 0; }

        .scan-laser {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 100%;
            background: linear-gradient(180deg, transparent, rgba(16, 185, 129, 0.15) 50%, rgba(16, 185, 129, 0.4) 95%, #10b981 100%);
            clip-path: inset(0 0 100% 0);
            animation: scan 2.5s infinite linear;
            z-index: 6;
            border-radius: 10px;
            display: none;
        }
        @keyframes scan {
            0% { clip-path: inset(0 0 100% 0); }
            50% { clip-path: inset(0 0 0 0); }
            100% { clip-path: inset(100% 0 0 0); }
        }

        .target-container.scanning .scan-laser { display: block; }
        
        .target-container.success .bracket { 
            border-color: #34d399; box-shadow: 0 0 30px var(--success-glow);
            transform: scale(1.05); border-radius: 18px;
        }
        .target-container.alert .bracket { 
            border-color: #f87171; box-shadow: 0 0 30px var(--danger-glow);
            transform: scale(0.95);
        }

        /* Status Panel */
        .status-panel {
            position: absolute;
            bottom: 7%; left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            padding: 18px 35px;
            border-radius: 18px;
            text-align: center;
            z-index: 10;
            min-width: 300px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .status-panel.success { border-color: #34d399; background: rgba(6, 78, 59, 0.6); }
        .status-panel.error { border-color: #f87171; background: rgba(127, 29, 29, 0.6); animation: shake 0.5s; }

        .status-title { font-size: 1.45rem; font-weight: 700; margin-bottom: 4px; letter-spacing: 0.3px; }
        .status-desc { font-size: 0.88rem; color: #94a3b8; font-weight: 400; }
        
        /* Confidence & Score Meter */
        .meter-row {
            display: flex; gap: 1rem; margin-top: 10px; justify-content: center;
        }
        .meter {
            display: flex; align-items: center; gap: 6px; font-size: 0.72rem; font-weight: 600; color: #64748b;
        }
        .meter-bar {
            width: 60px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;
        }
        .meter-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
        .meter-fill.green { background: #10b981; }
        .meter-fill.yellow { background: #f59e0b; }
        .meter-fill.red { background: #f43f5e; }

        @keyframes shake {
            0%, 100% { transform: translateX(-50%); }
            25% { transform: translateX(-52%); }
            50% { transform: translateX(-48%); }
            75% { transform: translateX(-52%); }
        }

        @media (max-width: 768px) {
            .target-container { width: 260px; height: 340px; }
            .top-nav { padding: 15px 20px; flex-direction: column; gap: 12px; }
            .status-panel { bottom: 4%; padding: 14px 22px; min-width: 260px;}
        }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="scanVideo" autoplay muted playsinline></video>
        <div class="vignette"></div>
    </div>

    <div class="top-nav">
        <div class="logo">
            <i class="fa-solid fa-shield-halved"></i>
            <span>SmartFace AI</span>
        </div>
        <div class="nav-btns">
            <a href="{{ url_for('login') }}" class="auth-btn">
                <i class="fa-solid fa-user"></i> Employee Login
            </a>
            <a href="{{ url_for('admin_login') }}" class="auth-btn" style="border-color:rgba(139,92,246,0.2);">
                <i class="fa-solid fa-shield-halved" style="color:#8b5cf6;"></i> Admin
            </a>
        </div>
    </div>

    <div class="target-container" id="targetBox">
        <div class="bracket tl"></div><div class="bracket tr"></div>
        <div class="bracket bl"></div><div class="bracket br"></div>
        <div class="scan-laser"></div>
    </div>

    <div class="status-panel" id="statusPanel">
        <div class="status-title" id="sTitle">Awaiting Subject</div>
        <div class="status-desc" id="sDesc">Please look directly at the camera</div>
        <div class="meter-row" id="meterRow" style="display:none;">
            <div class="meter">
                <span>Confidence</span>
                <div class="meter-bar"><div class="meter-fill green" id="confFill" style="width:0%;"></div></div>
                <span id="confVal">0%</span>
            </div>
            <div class="meter">
                <span>Anti-Spoof</span>
                <div class="meter-bar"><div class="meter-fill green" id="spoofFill" style="width:0%;"></div></div>
                <span id="spoofVal">0</span>
            </div>
            <div class="meter">
                <span>Blinks</span>
                <span id="blinkCounter" style="color:#10b981; font-weight:700;">0/2</span>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/camera.js') }}"></script>
    <script>
    document.addEventListener("DOMContentLoaded", () => {
        startCamera("scanVideo");

        const targetBox = document.getElementById("targetBox");
        const statusPanel = document.getElementById("statusPanel");
        const sTitle = document.getElementById("sTitle");
        const sDesc = document.getElementById("sDesc");
        const vid = document.getElementById("scanVideo");
        const meterRow = document.getElementById("meterRow");
        const confFill = document.getElementById("confFill");
        const confVal = document.getElementById("confVal");
        const spoofFill = document.getElementById("spoofFill");
        const spoofVal = document.getElementById("spoofVal");

        let isProc = false;
        let eyeWasClosed = false;
        let blinkDetected = false;
        const blinkCounter = document.getElementById('blinkCounter');

        function updateMeters(conf, spoof) {
            meterRow.style.display = 'flex';
            confFill.style.width = conf + '%';
            confVal.innerText = conf + '%';
            confFill.className = 'meter-fill ' + (conf > 60 ? 'green' : conf > 30 ? 'yellow' : 'red');
            
            spoofFill.style.width = spoof + '%';
            spoofVal.innerText = spoof;
            spoofFill.className = 'meter-fill ' + (spoof > 50 ? 'green' : spoof > 25 ? 'yellow' : 'red');
            
            blinkCounter.innerText = blinkDetected ? "✓ PASS" : "BLINK";
            blinkCounter.style.color = blinkDetected ? '#10b981' : '#f59e0b';
        }

        function setCamStatus(title, desc, state) {
            sTitle.innerHTML = title;
            sDesc.innerHTML = desc;
            
            targetBox.className = "target-container";
            statusPanel.className = "status-panel";

            if (state === 'scanning') {
                targetBox.classList.add("scanning");
            } else if (state === 'success') {
                targetBox.classList.add("success");
                statusPanel.classList.add("success");
            } else if (state === 'alert' || state === 'unregistered') {
                targetBox.classList.add("alert");
                statusPanel.classList.add("error");
            } else {
                meterRow.style.display = 'none';
            }
        }

        async function engine() {
            if(!isProc && vid.readyState === 4) {
                isProc = true;
                const b64 = captureFrame("scanVideo");
                if(!b64) { isProc = false; setTimeout(engine, 400); return; }

                try {
                    const req = await fetch("{{ url_for('api_recognize_face') }}", {
                        method:'POST', headers:{'Content-Type':'application/json'},
                        body: JSON.stringify({image:b64, liveness_verified: blinkDetected})
                    });
                    const res = await req.json();

                    if (res.confidence !== undefined || res.anti_spoof_score !== undefined) {
                        updateMeters(res.confidence || 0, res.anti_spoof_score || 0);
                    }

                    if (res.multi_face) {
                        setCamStatus("Multiple Faces", "Only one person at a time please", "alert");
                    } else if(res.spoofing_detected) {
                        setCamStatus("⚠️ Spoof Detected", res.msg || "Live presence required.", "alert");
                        eyeWasClosed = false; blinkDetected = false;
                    } else if(res.recognized) {
                        
                        // Single-blink liveness detection using MediaPipe EAR
                        let metrics = res.liveness_metrics || {};
                        
                        if (!blinkDetected) {
                            // Track eye close→open transition = 1 blink
                            if (metrics.eyes_closed && !eyeWasClosed) {
                                eyeWasClosed = true;
                            } else if (!metrics.eyes_closed && eyeWasClosed) {
                                blinkDetected = true;
                                eyeWasClosed = false;
                            }
                        }

                        if (!blinkDetected) {
                            setCamStatus(
                                `<i class="fa-solid fa-fingerprint"></i> ${res.user}`,
                                `<span style="color:#10b981; font-weight:700;">Blink once to verify identity</span>`,
                                "scanning"
                            );
                        } else if(res.success) {
                            let initials = res.user.substring(0, 2).toUpperCase();
                            let avatar = `<div style="width:56px; height:56px; background:linear-gradient(135deg, #10b981, #06b6d4); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.4rem; font-weight:800; color:#fff; border:3px solid #fff; box-shadow:0 0 25px rgba(16,185,129,0.6); margin:0 auto 10px;">${initials}</div>`;
                            setCamStatus(avatar + `<div>Access Granted</div>`, `<span style='color:#34d399; font-weight:700; font-size:1.05rem;'>${res.msg}</span>`, "success");
                            
                            setTimeout(() => {
                                eyeWasClosed = false; blinkDetected = false; isProc = false;
                                setCamStatus("Awaiting Subject", "Please look directly at the camera", "normal");
                                setTimeout(engine, 500);
                            }, 3500);
                            return;
                        }
                    } else if(res.recognized === false && res.msg !== "Waiting for valid subject...") {
                        setCamStatus("Identity Unknown", "⚠️ Please <a href='{{ url_for('login') }}' style='color:#10b981; font-weight:bold;'>Register</a> first.", "unregistered");
                        eyeWasClosed = false; blinkDetected = false;
                        setTimeout(() => {
                            isProc = false;
                            setCamStatus("Awaiting Subject", "Please look directly at the camera", "normal");
                            setTimeout(engine, 500);
                        }, 3000);
                        return;
                    } else {
                        setCamStatus("Awaiting Subject", "Please look directly at the camera", "normal");
                        eyeWasClosed = false; blinkDetected = false;
                    }
                } catch(e) { console.error(e); }
                isProc = false;
            }
            setTimeout(engine, 300);
        }
        
        setTimeout(() => {
            setCamStatus("Initializing AI...", "Calibrating deep learning engine", "scanning");
            setTimeout(() => {
                setCamStatus("Awaiting Subject", "Please look directly at the camera", "normal");
                engine();
            }, 1200);
        }, 600);
    });
    </script>
</body>
</html>
